<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Royal Hoi An - Manager On Duty</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; 
            background-color: #ffffff; 
            color: #1a1a1a; 
            font-family: 'Times New Roman', Times, serif, 'Arial', sans-serif; 
            text-align: center;
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .border-frame {
            border: 20px solid transparent;
            border-image: linear-gradient(to bottom right, #b8860b, #e6c280, #b8860b) 20;
            width: 100vw;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            height: 100px;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-container img {
            max-height: 90px;
            object-fit: contain;
        }

        .title {
            font-size: 4.2rem;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic;
            font-weight: 500;
            color: #a37a3e; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 5px 0;
        }

        .avatar-container {
            border: 6px solid #a37a3e;
            padding: 2px;
            background: white;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .avatar {
            width: 300px;
            height: 360px;
            object-fit: cover;
            display: block;
            background-color: #f5f5f5;
        }

        .name {
            font-size: 3rem;
            font-weight: bold;
            color: #a37a3e;
            text-transform: uppercase;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .sub-text {
            font-size: 1.3rem;
            color: #555555;
            font-style: italic;
            max-width: 600px;
            line-height: 1.4;
            margin: 5px 0;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
            background: white;
            margin-bottom: 15px;
        }
        .qr-container img {
            width: 140px;
            height: 140px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="border-frame">
        <!-- Khu vực hiển thị Logo tự động từ cột E -->
        <div class="logo-container">
            <img id="hotelLogo" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='1' height='1'></svg>" alt="Hotel Logo" style="display:none;">
        </div>

        <div class="title">Manager On Duty</div>

        <div class="avatar-container">
            <img class="avatar" id="managerImg" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='300' height='360'></svg>" alt="Avatar">
        </div>

        <div class="name" id="managerName">ĐANG TẢI...</div>

        <div class="sub-text">
            Scan the QR code to contact our Duty Manager directly<br>
            We're here to assist you
        </div>

        <!-- Khu vực hiển thị Mã QR tự động -->
        <div class="qr-container" id="qrParent">
            <img id="qrcode" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='1' height='1'></svg>" alt="QR Code">
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://google.com'; 

        // Hàm hỗ trợ chuẩn hóa link sharepoint sang link tải trực tiếp
        function fixSharePointLink(link) {
            if (!link) return "";
            let cleanLink = link.replace(/["']/g, "").trim();
            if (cleanLink.includes("sharepoint.com") && !cleanLink.includes("download=1")) {
                cleanLink = cleanLink + (cleanLink.includes("?") ? "&download=1" : "?download=1");
            }
            return cleanLink;
        }

        async function updateScreen() {
            try {
                const response = await fetch(SHEET_URL + '&t=' + new Date().getTime());
                if (!response.ok) throw new Error('Không thể kết nối Google Sheets');
                
                const textData = await response.text();
                const rows = textData.split(/\r?\n/).map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                });

                let targetRow = null;
                for (let i = 1; i < rows.length; i++) {
                    if (rows[i] && rows[i][1] && rows[i][1].trim() !== "" && !rows[i][1].includes("HO TEN")) {
                        targetRow = rows[i];
                        break;
                    }
                }

                if (targetRow) {
                    const tenNhanVien = targetRow[1] ? targetRow[1].replace(/["']/g, "").trim() : "CHƯA CÓ TÊN";
                    let linkAnh = fixSharePointLink(targetRow[2]);
                    let linkQR = fixSharePointLink(targetRow[3]);
                    let linkLogo = fixSharePointLink(targetRow[4]); // Đọc dữ liệu từ cột E

                    // 1. Cập nhật Tên
                    document.getElementById('managerName').innerText = tenNhanVien;
                    
                    // 2. Cập nhật Ảnh chân dung
                    if (linkAnh) {
                        document.getElementById('managerImg').src = linkAnh;
                    }

                    // 3. Cập nhật Logo khách sạn
                    if (linkLogo) {
                        const logoImg = document.getElementById('hotelLogo');
                        logoImg.src = linkLogo;
                        logoImg.style.display = 'block';
                    }

                    // 4. SỬA LỖI TẠO QR: Dùng API tạo ảnh QR siêu tốc và ổn định tuyệt đối
                    if (linkQR) {
                        const qrUrl = `https://qrserver.com{encodeURIComponent(linkQR)}`;
                        document.getElementById('qrcode').src = qrUrl;
                    }
                }
            } catch (error) {
                console.error("Lỗi đồng bộ dữ liệu:", error);
            }
        }

        updateScreen();
        setInterval(updateScreen, 5000);
    </script>
</body>
</html>
