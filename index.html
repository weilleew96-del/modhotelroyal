<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Royal Hoi An - Manager On Duty</title>
    <!-- Nhúng thư viện tạo mã QR tự động ổn định -->
    <script src="https://cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; 
            background-color: #ffffff; 
            color: #1a1a1a; 
            font-family: 'Times New Roman', Times, serif, 'Arial', sans-serif; 
            text-align: center;
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .border-frame {
            border: 20px solid transparent;
            border-image: linear-gradient(to bottom right, #b8860b, #e6c280, #b8860b) 20;
            width: 100vw;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            height: 100px;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-container img {
            max-height: 90px;
            object-fit: contain;
        }

        .title {
            font-size: 4.2rem;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic;
            font-weight: 500;
            color: #a37a3e; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 5px 0;
        }

        .avatar-container {
            border: 6px solid #a37a3e;
            padding: 2px;
            background: white;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .avatar {
            width: 300px;
            height: 360px;
            object-fit: cover;
            display: block;
            background-color: #f5f5f5;
        }

        .name {
            font-size: 3rem;
            font-weight: bold;
            color: #a37a3e;
            text-transform: uppercase;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .sub-text {
            font-size: 1.3rem;
            color: #555555;
            font-style: italic;
            max-width: 600px;
            line-height: 1.4;
            margin: 5px 0;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background: white;
            margin-bottom: 15px;
            min-height: 160px;
        }
        #qrcode canvas, #qrcode img {
            margin: 0 auto;
            width: 140px !important;
            height: 140px !important;
        }
    </style>
</head>
<body>

    <div class="border-frame">
        <div class="logo-container">
            <img id="hotelLogo" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='1' height='1'></svg>" alt="Hotel Logo" style="display:none;">
        </div>

        <div class="title">Manager On Duty</div>

        <div class="avatar-container">
            <img class="avatar" id="managerImg" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='300' height='360'></svg>" alt="Avatar">
        </div>

        <div class="name" id="managerName">ĐANG TẢI...</div>

        <div class="sub-text">
            Scan the QR code to contact our Duty Manager directly<br>
            We're here to assist you
        </div>

        <div class="qr-container">
            <div id="qrcode"></div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMa0XQNuk2RGjjxFu1OrDUT5Zph0il_-wxdgWStnRbydzgbKeg7fs0pqaVMCVQaQVO-wC4Pf6AJrLD/pub?output=csv'; 
        
        let qrCodeInstance = null;
        let lastQRLink = "";

        function fixSharePointLink(link) {
            if (!link) return "";
            let cleanLink = link.replace(/["']/g, "").trim();
            if (cleanLink.includes("sharepoint.com") && !cleanLink.includes("download=1")) {
                cleanLink = cleanLink + (cleanLink.includes("?") ? "&download=1" : "?download=1");
            }
            return cleanLink;
        }

        async function updateScreen() {
            try {
                const response = await fetch(SHEET_URL + '&t=' + new Date().getTime());
                if (!response.ok) throw new Error('Không thể kết nối Google Sheets');
                
                const textData = await response.text();
                // Phân tách mảng dòng đơn giản hóa để tránh lỗi gãy kí tự chuỗi dài
                const lines = textData.split(/\r?\n/);
                
                if (lines.length > 1) {
                    const headerCells = lines[0].split(',').map(c => c.replace(/["']/g, "").trim().toUpperCase());
                    const dataCells = lines[1].split(',').map(c => c.replace(/["']/g, "").trim());

                    // Ép định vị cột chuẩn xác tuyệt đối theo tiêu đề trên sheet
                    let indexTen = headerCells.indexOf("HO TEN");
                    let indexAnh = headerCells.indexOf("ANH");
                    let indexQR = headerCells.indexOf("WHATSAPP");
                    let indexLogo = headerCells.indexOf("LOGO");

                    // Dự phòng số thứ tự cột nếu không tìm thấy chuỗi tiêu đề
                    if (indexTen === -1) indexTen = 1;
                    if (indexAnh === -1) indexAnh = 2;
                    if (indexQR === -1) indexQR = 4;
                    if (indexLogo === -1) indexLogo = 5;

                    const tenNhanVien = dataCells[indexTen] || "CHƯA CÓ TÊN";
                    const linkAnh = fixSharePointLink(dataCells[indexAnh]);
                    const linkQR = dataCells[indexQR] ? dataCells[indexQR].replace(/["']/g, "").trim() : "";
                    const linkLogo = fixSharePointLink(dataCells[indexLogo]);

                    // 1. Cập nhật Tên
                    document.getElementById('managerName').innerText = tenNhanVien;
                    
                    // 2. Cập nhật Ảnh chân dung
                    if (linkAnh) {
                        document.getElementById('managerImg').src = linkAnh;
                    }

                    // 3. Cập nhật Logo
                    if (linkLogo) {
                        const logoImg = document.getElementById('hotelLogo');
                        logoImg.src = linkLogo;
                        logoImg.style.display = 'block';
                    }

                    // 4. ĐÃ SỬA LỖI: Thuật toán dọn dẹp sạch sẽ chuỗi thô để vẽ QR nội bộ trực tiếp
                    if (linkQR && linkQR !== lastQRLink) {
                        lastQRLink = linkQR;
                        document.getElementById('qrcode').innerHTML = ""; // Làm sạch khung vẽ
                        
                        qrCodeInstance = new QRCode(document.getElementById("qrcode"), { 
                            text: linkQR, 
                            width: 140, 
                            height: 140,
                            colorDark : "#000000",
                            colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.H
                        });
                    }
                }
            } catch (error) {
                console.error("Lỗi đồng bộ dữ liệu hệ thống:", error);
            }
        }

        updateScreen();
        setInterval(updateScreen, 5000);
    </script>
</body>
</html>
