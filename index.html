<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hotel Royal Hoi An - Manager On Duty</title>

<style>
*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#fff;
}

/* VIDEO QUẢNG CÁO */
.full-promo-video{
    position:absolute;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    background:#000;
    z-index:999;
}

/* KHUNG MOD XOAY 90 ĐỘ */
.mod-wrapper{
    position:absolute;
    width:100vh;
    height:100vw;
    top:0;
    left:100vw;

    transform:rotate(90deg);
    transform-origin:top left;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#1a1a1a;
    font-family:'Times New Roman',serif;
    text-align:center;
}

.border-frame{
    width:95%;
    height:95%;

    border:20px solid transparent;
    border-image:linear-gradient(to bottom right,#b8860b,#e6c280,#b8860b) 20;

    padding:30px 20px;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
}

.logo-container{
    height:90px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.logo-container img{
    max-height:80px;
}

.title{
    font-size:3.5rem;
    font-family:Georgia,serif;
    font-style:italic;
    color:#a37a3e;
    text-transform:uppercase;
}

.avatar-container{
    border:6px solid #a37a3e;
    padding:2px;
    background:#fff;
}

.avatar{
    width:280px;
    height:350px;
    object-fit:cover;
}

.name{
    font-size:2.8rem;
    font-weight:bold;
    color:#a37a3e;
    text-transform:uppercase;
}

.sub-text{
    font-size:1.2rem;
    color:#555;
    font-style:italic;
    line-height:1.5;
}

.qr-container img{
    width:130px;
    height:130px;
}
</style>
</head>

<body>

<video
    id="promoVideo"
    class="full-promo-video"
    autoplay
    muted
    loop
    playsinline
    style="display:none;">
</video>

<div id="modFrame" class="mod-wrapper" style="display:none;">
    <div class="border-frame">

        <div class="logo-container">
            <img id="hotelLogo" style="display:none;">
        </div>

        <div class="title">
            Manager On Duty
        </div>

        <div class="avatar-container">
            <img id="managerImg" class="avatar">
        </div>

        <div class="name" id="managerName">
            ĐANG TẢI...
        </div>

        <div class="sub-text">
            Scan the QR code to contact our Duty Manager directly<br>
            We're here to assist you
        </div>

        <div class="qr-container">
            <img id="qrcode" style="display:none;">
        </div>

    </div>
</div>

<script>

/* THAY LINK GOOGLE SHEET CSV TẠI ĐÂY */
const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTMa0XQNuk2RGjjxFu1OrDUT5Zph0il_-wxdgWStnRbydzgbKeg7fs0pqaVMCVQaQVO-wC4Pf6AJrLD/pub?output=csv";

let currentVideoUrl = "";

function fixSharePointLink(link){
    if(!link) return "";

    let cleanLink = link.replace(/["']/g,"").trim();

    if(
        cleanLink.includes("sharepoint.com")
        &&
        !cleanLink.includes("download=1")
    ){
        cleanLink += cleanLink.includes("?")
            ? "&download=1"
            : "?download=1";
    }

    return cleanLink;
}

function getTodayStrings(){

    const t = new Date();

    const d = t.getDate();
    const m = t.getMonth()+1;
    const y = t.getFullYear();

    return [
        `${String(d).padStart(2,"0")}/${String(m).padStart(2,"0")}/${y}`,
        `${d}/${m}/${y}`
    ];
}

async function updateScreen(){

    try{

        const currentHour = new Date().getHours();

        
const now = new Date();

const currentHour = now.getHours();
const currentMinute = now.getMinutes();

const isMODTime =
(
    currentHour === 9 &&
    currentMinute >= 48 &&
    currentMinute < 55
);


        const url =
            SHEET_URL +
            (SHEET_URL.includes("?") ? "&" : "?") +
            "t=" +
            Date.now();

        const response = await fetch(url);

        if(!response.ok){
            throw new Error("Không đọc được dữ liệu Sheet");
        }

        const csv = await response.text();

        const rows = csv
            .split(/\r?\n/)
            .map(row =>
                row
                .split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                .map(c => c.replace(/["']/g,"").trim())
            );

        if(rows.length < 2){
            return;
        }

        const headers =
            rows[0].map(h => h.toUpperCase().trim());

        const indexNgay = headers.indexOf("NGAY");
        const indexTen = headers.indexOf("HO TEN");
        const indexAnh = headers.indexOf("ANH");
        const indexQR = headers.indexOf("WHATSAPP");
        const indexLogo = headers.indexOf("LOGO");
        const indexVideoQC = headers.indexOf("VIDEO_QC");

        if(
            indexNgay === -1 ||
            indexTen === -1 ||
            indexAnh === -1
        ){
            throw new Error("Sai tên cột trong Google Sheet");
        }

        let targetRow = null;

        const todayFormats = getTodayStrings();

        for(let i=1;i<rows.length;i++){

            if(
                rows[i][indexNgay] &&
                todayFormats.includes(rows[i][indexNgay].trim())
            ){
                targetRow = rows[i];
                break;
            }
        }

        if(!targetRow){
            targetRow = rows[1];
        }

        let videoLink = "";

        if(
            indexVideoQC !== -1 &&
            rows[1][indexVideoQC]
        ){
            videoLink =
                fixSharePointLink(
                    rows[1][indexVideoQC]
                );
        }

        const modFrame =
            document.getElementById("modFrame");

        const promoVideo =
            document.getElementById("promoVideo");

        if(isMODTime){

            promoVideo.pause();
            promoVideo.style.display = "none";

            modFrame.style.display = "flex";

            if(targetRow){

                const managerName =
                    targetRow[indexTen] || "N/A";

                const imgLink =
                    fixSharePointLink(
                        targetRow[indexAnh]
                    );

                const qrLink =
                    fixSharePointLink(
                        targetRow[indexQR]
                    );

                const logoLink =
                    fixSharePointLink(
                        targetRow[indexLogo]
                    );

                document.getElementById("managerName")
                    .innerText = managerName;

                const avatar =
                    document.getElementById("managerImg");

                if(imgLink && avatar.src !== imgLink){
                    avatar.src = imgLink;
                }

                const logo =
                    document.getElementById("hotelLogo");

                if(logoLink && logo.src !== logoLink){
                    logo.src = logoLink;
                    logo.style.display = "block";
                }

                const qr =
                    document.getElementById("qrcode");

                if(qrLink && qr.src !== qrLink){
                    qr.src = qrLink;
                    qr.style.display = "block";
                }
            }

        }else{

            modFrame.style.display = "none";
            promoVideo.style.display = "block";

            if(
                videoLink &&
                videoLink !== currentVideoUrl
            ){
                currentVideoUrl = videoLink;

                promoVideo.src = currentVideoUrl;

                promoVideo.load();

                promoVideo.play()
                    .catch(err =>
                        console.log(err)
                    );
            }
        }

    }catch(error){

        console.error(
            "Lỗi hệ thống:",
            error
        );
    }
}

updateScreen();
setInterval(updateScreen,5000);

</script>

</body>
</html>
