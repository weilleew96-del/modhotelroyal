<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Royal Hoi An - Manager On Duty</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; 
            background-color: #ffffff; 
            color: #1a1a1a; 
            font-family: 'Times New Roman', Times, serif, 'Arial', sans-serif; 
            text-align: center;
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .border-frame {
            border: 20px solid transparent;
            border-image: linear-gradient(to bottom right, #b8860b, #e6c280, #b8860b) 20;
            width: 100vw;
            height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            height: 100px;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-container img {
            max-height: 90px;
            object-fit: contain;
        }

        .title {
            font-size: 4.2rem;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic;
            font-weight: 500;
            color: #a37a3e; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 5px 0;
        }

        .avatar-container {
            border: 6px solid #a37a3e;
            padding: 2px;
            background: white;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .avatar {
            width: 300px;
            height: 360px;
            object-fit: cover;
            display: block;
            background-color: #f5f5f5;
        }

        .name {
            font-size: 3rem;
            font-weight: bold;
            color: #a37a3e;
            text-transform: uppercase;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .sub-text {
            font-size: 1.3rem;
            color: #555555;
            font-style: italic;
            max-width: 600px;
            line-height: 1.4;
            margin: 5px 0;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
            background: white;
            margin-bottom: 15px;
            min-height: 140px;
        }
        .qr-container img {
            width: 140px;
            height: 140px;
            display: block;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="border-frame">
        <div class="logo-container">
            <img id="hotelLogo" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='1' height='1'></svg>" alt="Hotel Logo" style="display:none;">
        </div>

        <div class="title">Manager On Duty</div>

        <div class="avatar-container">
            <img class="avatar" id="managerImg" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='300' height='360'></svg>" alt="Avatar">
        </div>

        <div class="name" id="managerName">ĐANG TẢI...</div>

        <div class="sub-text">
            Scan the QR code to contact our Duty Manager directly<br>
            We're here to assist you
        </div>

        <div class="qr-container">
            <img id="qrcode" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='1' height='1'></svg>" alt="QR Code" style="display:none;">
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMa0XQNuk2RGjjxFu1OrDUT5Zph0il_-wxdgWStnRbydzgbKeg7fs0pqaVMCVQaQVO-wC4Pf6AJrLD/pub?output=csv'; 

        function fixSharePointLink(link) {
            if (!link) return "";
            let cleanLink = link.replace(/["']/g, "").trim();
            if (cleanLink.includes("sharepoint.com") && !cleanLink.includes("download=1")) {
                cleanLink = cleanLink + (cleanLink.includes("?") ? "&download=1" : "?download=1");
            }
            return cleanLink;
        }

        // Hàm lấy ngày hiện tại định dạng DD/MM/YYYY để so khớp với Sheets
        function getTodayString() {
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const mm = String(today.getMonth() + 1).padStart(2, '0'); // Tháng trong JS tính từ 0
            const yyyy = today.getFullYear();
            return `${dd}/${mm}/${yyyy}`;
        }

        async function updateScreen() {
            try {
                const response = await fetch(SHEET_URL + '&t=' + new Date().getTime());
                if (!response.ok) throw new Error('Không thể kết nối Google Sheets');
                
                const textData = await response.text();
                const rows = textData.split(/\r?\n/).map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/["']/g, "").trim());
                });

                if (rows.length > 0) {
                    const headers = rows[0].map(h => h.toUpperCase().trim());
                    
                    const indexNgay = headers.indexOf("NGAY");
                    const indexTen = headers.indexOf("HO TEN");
                    const indexAnh = headers.indexOf("ANH");
                    const indexQR = headers.indexOf("WHATSAPP");
                    const indexLogo = headers.indexOf("LOGO");

                    const todayStr = getTodayString();
                    let targetRow = null;

                    // THUẬT TOÁN ĐỔI MỚI: Quét qua toàn bộ các hàng để tìm hàng nào trùng khớp ngày hôm nay ở Cột A
                    for (let i = 1; i < rows.length; i++) {
                        if (rows[i] && rows[i][indexNgay] === todayStr) {
                            targetRow = rows[i];
                            break;
                        }
                    }

                    // Trường hợp dự phòng: Nếu cả danh sách không ai trực ngày hôm nay, lấy tạm hàng đầu tiên có dữ liệu
                    if (!targetRow) {
                        for (let i = 1; i < rows.length; i++) {
                            if (rows[i] && rows[i][indexTen] && rows[i][indexTen] !== "") {
                                targetRow = rows[i];
                                break;
                            }
                        }
                    }

                    if (targetRow) {
                        const tenNhanVien = targetRow[indexTen] || "CHƯA CÓ TÊN";
                        const linkAnh = fixSharePointLink(targetRow[indexAnh]);
                        const linkQR = fixSharePointLink(targetRow[indexQR]);
                        const linkLogo = fixSharePointLink(targetRow[indexLogo]);

                        document.getElementById('managerName').innerText = tenNhanVien;
                        
                        if (linkAnh) {
                            document.getElementById('managerImg').src = linkAnh;
                        }

                        if (linkLogo) {
                            const logoImg = document.getElementById('hotelLogo');
                            logoImg.src = linkLogo;
                            logoImg.style.display = 'block';
                        }

                        if (linkQR) {
                            const qrImg = document.getElementById('qrcode');
                            qrImg.src = linkQR;
                            qrImg.style.display = 'block';
                        }
                    }
                }
            } catch (error) {
                console.error("Lỗi đồng bộ lịch trực hệ thống:", error);
            }
        }

        // Tự động kiểm tra và cập nhật lịch trực liên tục sau mỗi 5 giây
        updateScreen();
        setInterval(updateScreen, 5000);
    </script>
</body>
</html>
