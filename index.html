<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Royal Hoi An - Manager On Duty</title>
    <!-- Nhúng thư viện tạo mã QR tự động ổn định -->
    <script src="https://cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; 
            background-color: #ffffff; /* Nền trắng sang trọng */
            color: #1a1a1a; 
            font-family: 'Times New Roman', Times, serif, 'Arial', sans-serif; 
            text-align: center;
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        /* Khung viền hoa văn bao quanh màn hình */
        .border-frame {
            border: 20px solid transparent;
            border-image: linear-gradient(to bottom right, #b8860b, #e6c280, #b8860b) 20;
            width: 100vw;
            height: 100vh;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            max-height: 120px;
            margin-bottom: 10px;
        }
        .logo-container img {
            max-height: 100px;
            object-fit: contain;
        }

        .title {
            font-size: 4.5rem;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic;
            font-weight: 500;
            color: #a37a3e; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px 0;
        }

        /* Khung chứa ảnh chân dung viền vàng cổ điển */
        .avatar-container {
            border: 6px solid #a37a3e;
            padding: 2px;
            background: white;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 15px 0;
        }
        .avatar {
            width: 320px;
            height: 380px;
            object-fit: cover;
            display: block;
            background-color: #f5f5f5;
        }

        .name {
            font-size: 3.2rem;
            font-weight: bold;
            color: #a37a3e;
            text-transform: uppercase;
            margin: 15px 0;
            letter-spacing: 1px;
        }

        .sub-text {
            font-size: 1.4rem;
            color: #555555;
            font-style: italic;
            max-width: 600px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background: white;
            margin-bottom: 20px;
            min-height: 160px;
        }
        #qrcode img {
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="border-frame">
        <div class="logo-container">
            <img id="hotelLogo" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='200' height='80'></svg>" alt="Hotel Logo">
        </div>

        <div class="title" id="dutyTitle">Manager On Duty</div>

        <div class="avatar-container">
            <img class="avatar" id="managerImg" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='320' height='380'></svg>" alt="Avatar">
        </div>

        <div class="name" id="managerName">ĐANG TẢI...</div>

        <div class="sub-text">
            Scan the QR code to contact our Duty Manager directly<br>
            We're here to assist you
        </div>

        <div class="qr-container">
            <div id="qrcode"></div>
        </div>
    </div>

    <script>
        // Đường link CSV kết nối trực tiếp đến bảng tính Google Sheets của bạn
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMa0XQNuk2RGjjxFu1OrDUT5Zph0il_-wxdgWStnRbydzgbKeg7fs0pqaVMCVQaQVO-wC4Pf6AJrLD/pub?gid=0&single=true&output=csv'; 

        async function updateScreen() {
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error('Không thể kết nối Google Sheets');
                
                const textData = await response.text();
                
                // Bóc tách dữ liệu file CSV
                const rows = textData.split(/\r?\n/).map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                });

                // Thuật toán thông minh: Tự động quét tìm dòng đầu tiên có chứa Tên nhân viên (Bỏ qua dòng trống)
                let targetRow = null;
                for (let i = 1; i < rows.length; i++) {
                    if (rows[i] && rows[i][1] && rows[i][1].trim() !== "" && rows[i][1].includes("HO TEN") === false) {
                        targetRow = rows[i];
                        break;
                    }
                }

                if (targetRow) {
                    const tenNhanVien = targetRow[1] ? targetRow[1].replace(/["']/g, "").trim() : "CHƯA CÓ TÊN";
                    let linkAnh = targetRow[2] ? targetRow[2].replace(/["']/g, "").trim() : "";
                    let linkQR = targetRow[3] ? targetRow[3].replace(/["']/g, "").trim() : "https://google.com";

                    // Hiển thị tên nhân viên lên màn hình TV
                    document.getElementById('managerName').innerText = tenNhanVien;
                    
                    // Xử lý thông minh ép link ảnh SharePoint hiển thị trực tiếp
                    if (linkAnh) {
                        if (linkAnh.includes("sharepoint.com") && !linkAnh.includes("download=1")) {
                            linkAnh = linkAnh + (linkAnh.includes("?") ? "&download=1" : "?download=1");
                        }
                        document.getElementById('managerImg').src = linkAnh;
                    }

                    // Xử lý và tự động vẽ lại mã QR WhatsApp
                    if (linkQR) {
                        if (linkQR.includes("sharepoint.com") && !linkQR.includes("download=1")) {
                            linkQR = linkQR + (linkQR.includes("?") ? "&download=1" : "?download=1");
                        }
                        document.getElementById('qrcode').innerHTML = "";
                        new QRCode(document.getElementById("qrcode"), { 
                            text: linkQR, 
                            width: 160, 
                            height: 160,
                            colorDark : "#000000",
                            colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.H
                        });
                    }
                }
            } catch (error) {
                console.error("Lỗi cập nhật màn hình ca trực từ Google Sheets:", error);
            }
        }

        // Kích hoạt chạy ngay khi mở trình duyệt TV và tự động cập nhật sau mỗi 5 giây
        updateScreen();
        setInterval(updateScreen, 5000);
    </script>
</body>
</html>
