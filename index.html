<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Royal Hoi An - Manager On Duty</title>
    <style>
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0; 
            background-color: #ffffff; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* KHỐI 1: Video Quảng cáo gốc dọc - GIỮ NGUYÊN HƯỚNG BẢN GỐC KHÔNG XOAY */
        .full-promo-video {
            position: absolute;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            top: 0;
            left: 0;
            z-index: 999;
            background-color: #000000;
        }

        /* KHỐI 2: KHUNG ÉP XOAY 90 ĐỘ CHỈ ÁP DỤNG CHO BẢNG CA TRỰC MOD */
        .mod-wrapper {
            position: absolute;
            width: 100vh;  
            height: 100vw; 
            top: 0;
            left: 100vw;
            transform: rotate(90deg);
            transform-origin: top left;
            
            display: flex; 
            justify-content: center; 
            align-items: center;
            color: #1a1a1a; 
            font-family: 'Times New Roman', Times, serif, 'Arial', sans-serif; 
            text-align: center;
        }

        /* Giao diện Bảng ca trực MOD */
        .border-frame {
            border: 20px solid transparent;
            border-image: linear-gradient(to bottom right, #b8860b, #e6c280, #b8860b) 20;
            width: 95%;
            height: 95%;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }
        .logo-container img {
            max-height: 80px;
            object-fit: contain;
        }

        .title {
            font-size: 3.5rem;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic;
            font-weight: 500;
            color: #a37a3e; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 5px 0;
        }

        .avatar-container {
            border: 6px solid #a37a3e;
            padding: 2px;
            background: white;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .avatar {
            width: 280px;
            height: 350px;
            object-fit: cover;
            display: block;
            background-color: #f5f5f5;
        }

        .name {
            font-size: 2.8rem;
            font-weight: bold;
            color: #a37a3e;
            text-transform: uppercase;
            margin: 5px 0;
            letter-spacing: 1px;
        }

        .sub-text {
            font-size: 1.2rem;
            color: #555555;
            font-style: italic;
            max-width: 500px;
            line-height: 1.4;
            margin: 5px 0;
        }

        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
            background: white;
            margin-bottom: 10px;
            min-height: 130px;
        }
        .qr-container img {
            width: 130px;
            height: 130px;
            display: block;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <!-- Video phát độc lập theo hướng gốc -->
    <video class="full-promo-video" id="promoVideo" autoplay muted loop playsinline style="display:none;"></video>

    <!-- Khối thông tin ca trực MOD bọc riêng để xoay 90 độ -->
    <div class="mod-wrapper" id="modFrame" style="display:none;">
        <div class="border-frame">
            <div class="logo-container">
                <img id="hotelLogo" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='1' height='1'></svg>" alt="Hotel Logo" style="display:none;">
            </div>

            <div class="title">Manager On Duty</div>

            <div class="avatar-container">
                <img class="avatar" id="managerImg" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='280' height='350'></svg>" alt="Avatar">
            </div>

            <div class="name" id="managerName">ĐANG TẢI...</div>

            <div class="sub-text">
                Scan the QR code to contact our Duty Manager directly<br>
                We're here to assist you
            </div>

            <div class="qr-container">
                <img id="qrcode" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='1' height='1'></svg>" alt="QR Code" style="display:none;">
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://google.com'; 

        let currentVideoUrl = "";

        function fixSharePointLink(link) {
            if (!link) return "";
            let cleanLink = link.replace(/["']/g, "").trim();
            if (cleanLink.includes("sharepoint.com") && !cleanLink.includes("download=1")) {
                cleanLink = cleanLink + (cleanLink.includes("?") ? "&download=1" : "?download=1");
            }
            return cleanLink;
        }

        function getTodayStrings() {
            const today = new Date();
            const d = today.getDate();
            const m = today.getMonth() + 1;
            const yyyy = today.getFullYear();
            return [`${String(d).padStart(2, '0')}/${String(m).padStart(2, '0')}/${yyyy}`, `${d}/${m}/${yyyy}`];
        }

        async function updateScreen() {
            try {
                // Kiểm tra giờ hệ thống thực tế của Tivi
                const currentHour = new Date().getHours();
                const isMODTime = (currentHour >= 17 && currentHour < 22); // Bật MOD từ 17h00 đến 21h59

                const response = await fetch(SHEET_URL + '&t=' + new Date().getTime());
                if (!response.ok) throw new Error('Không thể kết nối Google Sheets');
                
                const textData = await response.text();
                const rows = textData.split(/\r?\n/).map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/["']/g, "").trim());
                });

                if (rows.length > 0) {
                    const headers = rows.map(h => h.toUpperCase().trim());
                    const indexNgay = headers.indexOf("NGAY");
                    const indexTen = headers.indexOf("HO TEN");
                    const indexAnh = headers.indexOf("ANH");
                    const indexQR = headers.indexOf("WHATSAPP");
                    const indexLogo = headers.indexOf("LOGO");
                    const indexVideoQC = headers.indexOf("VIDEO_QC");

                    const todayFormats = getTodayStrings();
                    let targetRow = null;

                    // 1. Quét tìm hàng trùng ngày hôm nay để lấy thông tin ca trực MOD
                    for (let i = 1; i < rows.length; i++) {
                        if (rows[i] && rows[i][indexNgay] && todayFormats.includes(rows[i][indexNgay].trim())) {
                            targetRow = rows[i];
                            break;
                        }
                    }

                    // Dự phòng nếu không thấy dòng trùng ngày
                    if (!targetRow && rows.length > 1) {
                        targetRow = rows[1];
                    }

                    // 2. Ép cố định bốc duy nhất link video ở ô G2 (Dòng dữ liệu đầu tiên)
                    let linkVideoQC = "";
                    if (rows.length > 1 && rows[1][indexVideoQC]) {
                        linkVideoQC = fixSharePointLink(rows[1][indexVideoQC]);
                    }

                    const modFrame = document.getElementById('modFrame');
                    const videoTag = document.getElementById('promoVideo');

                    // ĐIỀU PHỐI HIỂN THỊ
                    if (isMODTime) {
                        // Khung giờ 17h - 22h: Ẩn hoàn toàn video, bật bảng thông tin ca trực MOD
                        videoTag.style.display = 'none';
                        videoTag.src = "";
                        currentVideoUrl = "";
                        
                        modFrame.style.display = 'flex';

                        if (targetRow) {
                            const tenNhanVien = targetRow[indexTen] || "CHƯA CÓ TÊN";
                            const linkAnh = fixSharePointLink(targetRow[indexAnh]);
                            const linkQR = fixSharePointLink(targetRow[indexQR]);
                            const linkLogo = fixSharePointLink(targetRow[indexLogo]);

                            document.getElementById('managerName').innerText = tenNhanVien;
                            if (linkAnh) document.getElementById('managerImg').src = linkAnh;
                            if (linkLogo) {
                                const logoImg = document.getElementById('hotelLogo');
                                logoImg.src = linkLogo;
                                logoImg.style.display = 'block';
                            }
                            if (linkQR) {
                                const qrImg = document.getElementById('qrcode');
                                qrImg.src = linkQR;
                                qrImg.style.display = 'block';
                            }
                        }
                    } else {
                        // Ngoài khung giờ trên: Ẩn bảng MOD, phát video gốc dọc tràn viền không xoay
                        modFrame.style.display = 'none';
                        videoTag.style.display = 'block';

                        if (linkVideoQC && linkVideoQC !== currentVideoUrl) {
                            currentVideoUrl = linkVideoQC;
                            videoTag.src = linkVideoQC;
                            videoTag.play().catch(e => console.log("Chờ tivi tương tác phát video"));
                        }
                    }
                }
            } catch (error) {
                console.error("Lỗi vận hành hệ thống:", error);
            }
        }

        updateScreen();
        setInterval(updateScreen, 5000);
